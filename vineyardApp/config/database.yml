default: &default
  adapter: postgresql
  encoding: unicode
  pool: <%= ENV.fetch("DB_POOL", 5).to_i %>

development:
  <<: *default
  database: <%= ENV.fetch("DB_NAME", "vineyard_app") %>
  username: <%= ENV.fetch("DB_USERNAME", "postgres") %>
  password: <%= ENV.fetch("DB_PASSWORD", "Sevastopol123!") %>
  host: <%= ENV.fetch("DB_HOST", "localhost") %>

test:
  <<: *default
  database: <%= ENV.fetch("DB_TEST_NAME", "vineyard_app_test") %>
  username: <%= ENV.fetch("DB_USERNAME", "postgres") %>
  password: <%= ENV.fetch("DB_PASSWORD", "Sevastopol123!") %>
  host: <%= ENV.fetch("DB_HOST", "localhost") %>

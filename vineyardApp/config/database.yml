default: &default
  adapter: postgresql
  encoding: unicode
  pool: <%= ENV.fetch("DB_POOL", 5).to_i %>
  # Без явного порта Rails использует 5432. Второй инстанс на Windows часто на 5433 — как в backend.
  port: <%= ENV.fetch("DB_PORT", 5433).to_i %>

development:
  <<: *default
  database: <%= ENV.fetch("DB_NAME", "vineyard_app") %>
  username: <%= ENV.fetch("DB_USERNAME", "vineyard_user") %>
  password: <%= ENV.fetch("DB_PASSWORD", "1029") %>
  host: <%= ENV.fetch("DB_HOST", "localhost") %>

test:
  <<: *default
  database: <%= ENV.fetch("DB_TEST_NAME", "vineyard_app_test") %>
  username: <%= ENV.fetch("DB_USERNAME", "vineyard_user") %>
  password: <%= ENV.fetch("DB_PASSWORD", "1029") %>
  host: <%= ENV.fetch("DB_HOST", "localhost") %>
